<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WePai - Tu asistente de entrenamiento</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#a04100',
            'primary-container': '#ff6b00',
            'on-primary': '#ffffff',
            surface: '#fcf9f8',
            'surface-container-low': '#f6f3f2',
            'surface-container': '#f0edec',
            'surface-container-high': '#ebe7e7',
            'surface-container-highest': '#e5e2e1',
            'surface-container-lowest': '#ffffff',
            'on-surface': '#1c1b1b',
            'on-surface-variant': '#5a4136',
            outline: '#8e7164',
            'outline-variant': '#e2bfb0',
            'inverse-surface': '#313030',
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            label: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #a04100;
      --primary-container: #ff6b00;
      --on-primary: #ffffff;
      --surface: #fcf9f8;
      --surface-container-low: #f6f3f2;
      --surface-container: #f0edec;
      --surface-container-high: #ebe7e7;
      --surface-container-highest: #e5e2e1;
      --surface-container-lowest: #ffffff;
      --on-surface: #1c1b1b;
      --on-surface-variant: #5a4136;
      --outline: #8e7164;
      --outline-variant: #e2bfb0;
      --inverse-surface: #313030;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fcf9f8;
      min-height: max(884px, 100dvh);
    }

    h1, h2, h3, .headline {
      font-family: 'Manrope', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .signature-gradient {
      background: linear-gradient(135deg, #a04100 0%, #ff6b00 100%);
    }

    /* Fix mobile tap highlight */
    button {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    #date-carousel button {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
      box-shadow: none !important;
    }
    
    #date-carousel button:focus,
    #date-carousel button:focus-visible {
      outline: none !important;
      box-shadow: none !important;
      border-color: transparent !important;
    }
    
    #date-carousel button:active {
      border-color: transparent !important;
    }

    /* Global fix for all interactive elements */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    button, input, label, select, textarea, [role="button"] {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
    }
    
    button:focus, button:focus-visible,
    input:focus, input:focus-visible,
    label:focus, label:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }
    
    input[type="checkbox"] {
      -webkit-tap-highlight-color: transparent;
    }
    
    input[type="checkbox"]:checked {
      -webkit-tap-highlight-color: transparent;
    }

    .glass-nav {
      backdrop-filter: blur(20px);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
      scrollbar-color: transparent transparent;
    }
    
    #date-carousel::-webkit-scrollbar {
      display: none !important;
    }

    input:focus, select:focus, textarea:focus {
      background: var(--surface-container-high) !important;
      outline: none;
    }

    .input-field {
      background: var(--surface-container-low);
      border-radius: 16px;
      transition: background 0.2s;
    }
    .input-field:focus-within {
      background: var(--surface-container-high);
    }

    .card-press:active {
      transform: scale(0.98);
    }

    @media (min-width: 1024px) {
      .mobile-nav { display: none !important; }
    }

    .screen {
      display: none;
    }
    .screen.active {
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Dark Mode */
    .dark {
      --primary: #ff6b00;
      --primary-container: #a04100;
      --on-primary: #ffffff;
      --surface: #1c1b1b;
      --surface-container-low: #252525;
      --surface-container: #2d2d2d;
      --surface-container-high: #383838;
      --surface-container-highest: #424242;
      --surface-container-lowest: #1c1b1b;
      --on-surface: #e6e1e5;
      --on-surface-variant: #c7c5cb;
      --outline: #938f99;
      --outline-variant: #49454f;
      --inverse-surface: #e6e1e5;
    }

    .dark body {
      background-color: #1c1b1b;
    }

    .dark .bg-surface {
      background-color: #1c1b1b;
    }

    .dark .bg-surface-container {
      background-color: #2d2d2d;
    }

    .dark .bg-surface-container-low {
      background-color: #252525;
    }

    .dark .bg-surface-container-lowest {
      background-color: #1c1b1b;
    }

    .dark .text-on-surface {
      color: #e6e1e5;
    }

    .dark .text-on-surface-variant {
      color: #c7c5cb;
    }

    .dark .text-outline {
      color: #938f99;
    }

    .dark .border-outline-variant {
      border-color: #49454f;
    }

    .dark header {
      background-color: rgba(28, 27, 27, 0.95) !important;
      border-color: rgba(148, 143, 153, 0.15) !important;
    }

    .dark .bg-surface-container-high {
      background-color: #383838;
    }

    .dark .input-field {
      background-color: #2d2d2d;
      border-color: #49454f;
      color: #e6e1e5;
    }

    .dark .bg-red-50 {
      background-color: rgba(255, 87, 34, 0.15);
    }
    
    .mobile-nav .nav-item.nav-active {
      color: #FF6B00 !important;
    }

    /* Page transitions */
    #app > div {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading state */
    .page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: var(--on-surface-variant);
    }

    .page-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 1rem;
      color: var(--on-surface-variant);
    }

    .page-error button {
      padding: 0.75rem 1.5rem;
      background: var(--primary-container);
      color: white;
      border-radius: 9999px;
      font-weight: 600;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      pointer-events: none;
    }
    
    .toast {
      background: rgba(28, 27, 27, 0.95);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .toast.show {
      opacity: 1;
      transform: scale(1);
    }
    
    .toast .material-symbols-outlined {
      color: #4ade80;
    }
    
    .dark .toast {
      background: rgba(48, 48, 48, 0.95);
    }

    /* Mockup Styles */
    .section-eyebrow {
      font-family: 'Manrope', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #C45A0A;
      margin-bottom: 6px;
    }

    .dark .section-eyebrow {
      color: #ff8534;
    }

    .routine-title {
      font-family: 'Manrope', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #1c1b1b;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .dark .routine-title {
      color: #e6e1e5;
    }

    .routine-meta {
      font-size: 13px;
      color: #A8998C;
      font-weight: 500;
    }

    .dark .routine-meta {
      color: #938f99;
    }

    .free-training-btn {
      background: transparent;
      border: 1.5px solid #EDE4D8;
      border-radius: 16px;
    }

    .dark .free-training-btn {
      border-color: #49454f;
    }

    .free-training-icon {
      background: #F5EFE6;
    }

    .dark .free-training-icon {
      background: #383838;
    }

    .free-training-text {
      color: #1c1b1b;
    }

    .dark .free-training-text {
      color: #e6e1e5;
    }

    .free-training-subtext {
      color: #A8998C;
    }

    .dark .free-training-subtext {
      color: #938f99;
    }

    .section-divider {
      height: 1px;
      background: #EDE4D8;
      margin: 4px 20px 20px;
      opacity: 0.6;
    }

    .dark .section-divider {
      background: #49454f;
    }

    .rest-hero {
      background: linear-gradient(135deg, #EEF3FF 0%, #E4EBFF 100%);
      border-radius: 20px;
      padding: 20px;
      border: 1.5px solid #D0DBFF;
      position: relative;
      overflow: hidden;
    }

    .rest-hero::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(91,127,212,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .rest-hero-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .rest-moon-icon {
      width: 42px; height: 42px;
      background: #fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 2px 8px rgba(91,127,212,0.15);
    }

    .rest-hero-title {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #2D3F7C;
    }

    .rest-hero-sub {
      font-size: 12px;
      color: #5B7FD4;
      font-weight: 500;
      margin-top: 2px;
    }

    .rest-tip {
      font-size: 13.5px;
      line-height: 1.55;
      color: #3D4F7A;
      font-weight: 400;
    }

    .ai-card {
      background: #FFFFFF;
      border-radius: 20px;
      border: 1.5px solid #EDE4D8;
      overflow: hidden;
      margin: 0 20px 16px;
    }
    
    .dark .ai-card {
      background: #1c1b1b;
      border-color: #49454f;
    }

    .ai-card-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #EDE4D8;
    }
    
    .dark .ai-card-header {
      border-bottom-color: #49454f;
    }

    .ai-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #C45A0A 0%, #E8834A 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .ai-name {
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #1C1410;
    }

    .ai-badge {
      font-size: 10px;
      font-weight: 600;
      color: #C45A0A;
      background: #FFF0E6;
      border-radius: 20px;
      padding: 2px 8px;
      margin-top: 1px;
      display: inline-block;
    }

    .ai-message {
      padding: 14px 18px;
      font-size: 13.5px;
      line-height: 1.6;
      color: #6B5B4E;
    }

    .ai-message strong {
      color: #1C1410;
      font-weight: 600;
    }

    .ai-ask-btn {
      margin: 0 18px 16px;
      width: calc(100% - 36px);
      padding: 13px;
      background: #FFF0E6;
      border: 1.5px dashed #E8834A;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    
    .dark .ai-ask-btn {
      background: #2d2d2d;
      border-color: #ff6b00;
    }

    .ai-ask-btn:hover {
      background: #FFE6D0;
    }
    
    .dark .ai-ask-btn:hover {
      background: #383838;
    }

    .ai-ask-btn span {
      font-size: 13px;
      font-weight: 500;
      color: #C45A0A;
      flex: 1;
      text-align: left;
    }

    .section-divider {
      height: 1px;
      background: #EDE4D8;
      margin: 4px 20px 20px;
      opacity: 0.6;
    }

    .routine-header {
      padding: 0 24px 20px;
    }

    .routine-title {
      font-family: 'Manrope', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #1C1410;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .routine-meta {
      font-size: 13px;
      color: #A8998C;
      font-weight: 500;
    }

    .routine-meta span {
      color: #C45A0A;
      font-weight: 600;
    }

    .main-routine-card {
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .main-routine-card:active {
      transform: scale(0.98);
    }

    /* Chat Styles */
    .chat-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 100px;
      margin-top: 70px;
      min-height: calc(100vh - 150px);
      background: #fcf9f8;
    }
    
    .dark .chat-main {
      background: #1c1b1b;
    }

    .chat-date {
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: #A8998C;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 10px 0;
    }

    .chat-topbar {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #EDE4D8;
      background: #FAFAF7;
    }
    
    .dark .chat-topbar {
      background: #1c1b1b;
      border-bottom-color: #49454f;
    }

    .chat-back {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #F5EFE6;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .dark .chat-back {
      background: #383838;
    }

    .chat-back svg {
      width: 16px;
      height: 16px;
      stroke: #1C1410;
      fill: none;
      stroke-width: 2.5;
    }
    
    .dark .chat-back svg {
      stroke: #e6e1e5;
    }

    .chat-avatar {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #C45A0A 0%, #E8834A 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 3px 10px rgba(196,90,10,0.25);
    }

    .chat-meta {
      flex: 1;
    }

    .dark .chat-name {
      color: #e6e1e5;
    }
    
    .dark .chat-status-text {
      color: #938f99;
    }

    .chat-name {
      font-size: 14px;
      font-weight: 800;
      color: #1C1410;
    }

    .chat-status {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 2px rgba(76,175,80,0.2); }
      50% { box-shadow: 0 0 0 4px rgba(76,175,80,0.1); }
    }

    .chat-status-text {
      font-size: 11px;
      color: #A8998C;
      font-weight: 500;
    }

    .msg-ai {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-ai-avatar {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #C45A0A 0%, #E8834A 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .bubble-ai {
      max-width: 76%;
      background: #F0EBE4;
      border-radius: 18px 18px 18px 4px;
      padding: 11px 14px;
      font-size: 13.5px;
      line-height: 1.55;
      color: #1C1410;
      border: 1px solid #EDE4D8;
      font-weight: 400;
    }
    
    .dark .bubble-ai {
      background: #1e1e1e;
      border-color: #3d3d3d;
      color: #e0e0e0;
      font-weight: 400;
    }

    .bubble-ai strong {
      color: #C45A0A;
      font-weight: 700;
    }
    
    .dark .bubble-ai strong {
      color: #ff8534;
      font-weight: 700;
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .bubble-user {
      max-width: 78%;
      background: #C45A0A;
      border-radius: 18px 18px 4px 18px;
      padding: 11px 14px;
      font-size: 13.5px;
      line-height: 1.55;
      color: #fff;
      font-weight: 400;
    }
    
    .dark .bubble-user {
      background: #e65c00;
      color: #fff;
      font-weight: 400;
    }

    .msg-typing {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .typing-bubble {
      background: #F0EBE4;
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      border: 1px solid #EDE4D8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .dark .typing-bubble {
      background: #2d2d2d;
      border-color: #49454f;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #A8998C;
      animation: typing 1.2s infinite;
    }
    
    .dark .typing-dot {
      background: #938f99;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 4px 0 10px;
    }

    .suggestion-chip {
      background: #FDF9F5;
      border: 1.5px solid #EDE4D8;
      border-radius: 20px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 500;
      color: #6B5B4E;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
    }
    
    .dark .suggestion-chip {
      background: #2d2d2d;
      border-color: #49454f;
      color: #c7c5cb;
    }

    .suggestion-chip:hover {
      background: #FFF0E6;
      border-color: #E8834A;
      color: #C45A0A;
    }
    
    .dark .suggestion-chip:hover {
      background: #383838;
      border-color: #ff6b00;
      color: #ff6b00;
    }

    .chat-input-bar {
      position: fixed;
      bottom: 110px;
      left: 0;
      right: 0;
      padding: 10px 14px 14px;
      background: #FAFAF7;
      border-top: 1px solid #EDE4D8;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 40;
    }
    
    .dark .chat-input-bar {
      background: #1c1b1b;
      border-top-color: #49454f;
    }

    .chat-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #FFFFFF;
      border: 1.5px solid #EDE4D8;
      border-radius: 24px;
      padding: 10px 14px;
      gap: 8px;
    }
    
    .dark .chat-input-wrap {
      background: #2d2d2d;
      border-color: #49454f;
    }

    .chat-input {
      flex: 1;
      border: none;
      background: transparent !important;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: #1C1410;
      outline: none;
    }
    
    .dark .chat-input {
      color: #e6e1e5 !important;
    }

    .chat-input::placeholder {
      color: #A8998C;
    }
    
    .dark .chat-input::placeholder {
      color: #938f99;
    }
    
    .dark .chat-header-btn {
      color: #938f99 !important;
    }
    
    .dark .chat-header-btn-profile {
      color: #ff6b00 !important;
    }

    .chat-mic-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-mic-btn svg {
      width: 20px;
      height: 20px;
      stroke: #A8998C;
      fill: none;
      stroke-width: 1.8;
    }

    .chat-mic-btn.recording svg {
      stroke: #C45A0A;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: #C45A0A;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(196,90,10,0.35);
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 14px rgba(196,90,10,0.45);
    }

    .send-btn svg {
      width: 17px;
      height: 17px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
    }

    /* Coach Nav Pill */
    .coach-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #C45A0A;
      border-radius: 20px;
      padding: 6px 12px 6px 8px;
      transition: background 0.2s;
    }

    .coach-pill svg {
      width: 14px;
      height: 14px;
      stroke: #fff !important;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .coach-pill-label {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Modal */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9998;
      display: none;
      align-items: center;

    #modal-overlay.show {

    #modal-content {

      padding: 1.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .dark #modal-content {
      background: #252525;
    }
  </style>
</head>
