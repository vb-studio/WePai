<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WePai - Tu asistente de entrenamiento</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#a04100',
            'primary-container': '#ff6b00',
            'on-primary': '#ffffff',
            surface: '#fcf9f8',
            'surface-container-low': '#f6f3f2',
            'surface-container': '#f0edec',
            'surface-container-high': '#ebe7e7',
            'surface-container-highest': '#e5e2e1',
            'surface-container-lowest': '#ffffff',
            'on-surface': '#1c1b1b',
            'on-surface-variant': '#5a4136',
            outline: '#8e7164',
            'outline-variant': '#e2bfb0',
            'inverse-surface': '#313030',
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            label: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #a04100;
      --primary-container: #ff6b00;
      --on-primary: #ffffff;
      --surface: #fcf9f8;
      --surface-container-low: #f6f3f2;
      --surface-container: #f0edec;
      --surface-container-high: #ebe7e7;
      --surface-container-highest: #e5e2e1;
      --surface-container-lowest: #ffffff;
      --on-surface: #1c1b1b;
      --on-surface-variant: #5a4136;
      --outline: #8e7164;
      --outline-variant: #e2bfb0;
      --inverse-surface: #313030;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fcf9f8;
      min-height: max(884px, 100dvh);
    }

    h1, h2, h3, .headline {
      font-family: 'Manrope', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .signature-gradient {
      background: linear-gradient(135deg, #a04100 0%, #ff6b00 100%);
    }

    /* Fix mobile tap highlight */
    button {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    #date-carousel button {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
      box-shadow: none !important;
    }
    
    #date-carousel button:focus,
    #date-carousel button:focus-visible {
      outline: none !important;
      box-shadow: none !important;
      border-color: transparent !important;
    }
    
    #date-carousel button:active {
      border-color: transparent !important;
    }

    /* Global fix for all interactive elements */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    button, input, label, select, textarea, [role="button"] {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
    }
    
    button:focus, button:focus-visible,
    input:focus, input:focus-visible,
    label:focus, label:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }
    
    input[type="checkbox"] {
      -webkit-tap-highlight-color: transparent;
    }
    
    input[type="checkbox"]:checked {
      -webkit-tap-highlight-color: transparent;
    }

    .glass-nav {
      backdrop-filter: blur(20px);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
      scrollbar-color: transparent transparent;
    }
    
    #date-carousel::-webkit-scrollbar {
      display: none !important;
    }

    input:focus, select:focus, textarea:focus {
      background: var(--surface-container-high) !important;
      outline: none;
    }

    .input-field {
      background: var(--surface-container-low);
      border-radius: 16px;
      transition: background 0.2s;
    }
    .input-field:focus-within {
      background: var(--surface-container-high);
    }

    .card-press:active {
      transform: scale(0.98);
    }

    @media (min-width: 1024px) {
      .mobile-nav { display: none !important; }
    }

    .screen {
      display: none;
    }
    .screen.active {
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Dark Mode */
    .dark {
      --primary: #ff6b00;
      --primary-container: #a04100;
      --on-primary: #ffffff;
      --surface: #1c1b1b;
      --surface-container-low: #252525;
      --surface-container: #2d2d2d;
      --surface-container-high: #383838;
      --surface-container-highest: #424242;
      --surface-container-lowest: #1c1b1b;
      --on-surface: #e6e1e5;
      --on-surface-variant: #c7c5cb;
      --outline: #938f99;
      --outline-variant: #49454f;
      --inverse-surface: #e6e1e5;
    }

    .dark body {
      background-color: #1c1b1b;
    }

    .dark .bg-surface {
      background-color: #1c1b1b;
    }

    .dark .bg-surface-container {
      background-color: #2d2d2d;
    }

    .dark .bg-surface-container-low {
      background-color: #252525;
    }

    .dark .bg-surface-container-lowest {
      background-color: #1c1b1b;
    }

    .dark .text-on-surface {
      color: #e6e1e5;
    }

    .dark .text-on-surface-variant {
      color: #c7c5cb;
    }

    .dark .text-outline {
      color: #938f99;
    }

    .dark .border-outline-variant {
      border-color: #49454f;
    }

    .dark header {
      background-color: rgba(28, 27, 27, 0.95) !important;
      border-color: rgba(148, 143, 153, 0.15) !important;
    }

    .dark .bg-surface-container-high {
      background-color: #383838;
    }

    .dark .input-field {
      background-color: #2d2d2d;
      border-color: #49454f;
      color: #e6e1e5;
    }

    .dark .bg-red-50 {
      background-color: rgba(255, 87, 34, 0.15);
    }
    
    .mobile-nav .nav-item.nav-active {
      color: #FF6B00 !important;
    }

    /* Page transitions */
    #app > div {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading state */
    .page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: var(--on-surface-variant);
    }

    .page-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 1rem;
      color: var(--on-surface-variant);
    }

    .page-error button {
      padding: 0.75rem 1.5rem;
      background: var(--primary-container);
      color: white;
      border-radius: 9999px;
      font-weight: 600;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      pointer-events: none;
    }
    
    .toast {
      background: rgba(28, 27, 27, 0.95);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .toast.show {
      opacity: 1;
      transform: scale(1);
    }
    
    .toast .material-symbols-outlined {
      color: #4ade80;
    }
    
    .dark .toast {
      background: rgba(48, 48, 48, 0.95);
    }

    /* Modal */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #modal-overlay.show {
      display: flex;
    }
    #modal-content {
      background: var(--surface-container-low);
      border-radius: 24px;
      padding: 1.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .dark #modal-content {
      background: #252525;
    }
  </style>
</head>
  <body class="bg-surface text-on-surface font-body min-h-screen">

    <!-- Toast Container -->
    <div id="toast-container">
      <div id="toast" class="toast">
        <span class="material-symbols-outlined">check_circle</span>
        <span id="toast-message">Cambios guardados</span>
      </div>
    </div>

    <!-- Modal for adding exercise -->
    <div id="modal-overlay">
      <div id="modal-content">
        <h3 class="font-headline text-xl font-bold mb-4 text-on-surface">Nuevo Ejercicio</h3>
        <input type="text" id="modal-input" placeholder="Nombre del ejercicio" 
          class="w-full p-4 rounded-xl bg-surface-container text-on-surface border border-outline-variant mb-4 font-body text-lg">
        <div class="flex gap-3">
          <button id="modal-cancel" class="flex-1 py-3 rounded-xl bg-surface-container text-on-surface font-semibold">Cancelar</button>
          <button id="modal-confirm" class="flex-1 py-3 rounded-xl signature-gradient text-white font-semibold">Añadir</button>
        </div>
      </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav fixed bottom-0 w-full z-50 rounded-t-[24px] bg-[#fcf9f8]/90 dark:bg-[#1c1b1b]/90 backdrop-blur-2xl border-t border-[#e2bfb0]/15 dark:border-[#49454f]/15 shadow-[0_-4px_20px_rgba(0,0,0,0.06)] flex justify-around items-center px-8 pb-8 pt-4 md:hidden">
      <button data-link href="/log" class="nav-item flex flex-col items-center justify-center text-[#1c1b1b]/60 dark:text-white/60 py-2 hover:text-[#FF6B00] transition-colors active:scale-90 duration-300">
        <span class="material-symbols-outlined text-2xl">edit_note</span>
        <span class="font-label text-[10px] mt-1">Registro</span>
      </button>
      <button data-link href="/" class="nav-item flex flex-col items-center justify-center text-[#1c1b1b]/60 dark:text-white/60 py-2 hover:text-[#FF6B00] transition-colors active:scale-90 duration-300">
        <span class="material-symbols-outlined text-2xl">dashboard</span>
        <span class="font-label text-[10px] mt-1">Dashboard</span>
      </button>
      <button data-link href="/routines" class="nav-item flex flex-col items-center justify-center text-[#1c1b1b]/60 dark:text-white/60 py-2 hover:text-[#FF6B00] transition-colors active:scale-90 duration-300">
        <span class="material-symbols-outlined text-2xl">fitness_center</span>
        <span class="font-label text-[10px] mt-1">Rutinas</span>
      </button>
      <button data-link href="/profile" class="nav-item flex flex-col items-center justify-center text-[#1c1b1b]/60 dark:text-white/60 py-2 hover:text-[#FF6B00] transition-colors active:scale-90 duration-300">
        <span class="material-symbols-outlined text-2xl mb-1">person</span>
        <span class="nav-label font-['Inter'] font-semibold text-[10px] tracking-widest uppercase">Perfil</span>
      </button>
    </nav>

    <!-- App Container -->
    <div id="app">
      <div class="page-loading">
        <span class="material-symbols-outlined text-4xl animate-spin">sync</span>
      </div>
    </div>

    <script type="module">
      import { init } from './src/app/init.js';
      init();
    </script>
  </body>
</html>
